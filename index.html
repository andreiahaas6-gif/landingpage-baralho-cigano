<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baralho Cigano - Descubra seu Destino</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 60px 40px;
      max-width: 800px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      font-size: 3em;
      margin-bottom: 20px;
      color: #764ba2;
    }
    p {
      font-size: 1.2em;
      line-height: 1.6;
      color: #555;
      margin-bottom: 30px;
    }
    .btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 15px 40px;
      border: none;
      border-radius: 30px;
      font-size: 1.1em;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: transform 0.3s;
    }
    .btn:hover {
      transform: translateY(-3px);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔮 Baralho Cigano</h1>
    <p>Descubra os segredos do destino através das cartas sagradas.<br>Tiragens precisas e consultas personalizadas.</p>
    <a href="https://wa.me/5511999999999" class="btn">Agende sua Consulta</a>
  </div>
</body>
</html>
